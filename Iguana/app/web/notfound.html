<html>

<head>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Open+Sans&display=swap" rel="stylesheet">
	<style>
		body {
			background: linear-gradient(#1A3664, #0164AD);
			position: fixed;
			top: 0;
			right: 0;
			bottom: 0;
			left: 0;
			background-attachment: fixed;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			font-family: 'Open Sans', Arial, Helvetica, sans-serif;
			font-weight: 400;
			font-size: 24px;
			color: #B3DDF5;
			text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
		}

		a.button {
			display: block;
			border-radius: 4px;
			padding: 16px 24px;
			text-decoration: none;
			background-color: #5CB533;
			color: #FFFFFF;
			font-family: 'Montserrat', Arial, Helvetica, sans-serif;
			font-weight: 600;
			font-size: 14px;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.5);
			box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.25);
			margin-top: 32px;
		}

		a.button:hover {
			background-color: #82c341;
		}

		a.button:active {
			background-color: #4aa527;
		}
	</style>
</head>

<body>
	<div>Sorry, this file was not found.</div>
	<a class="button" href="/">Go to the Dashboard</a>
</body>

</html>
